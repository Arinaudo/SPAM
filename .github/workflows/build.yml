name: Build SPAM

# Déclenchement : bouton manuel (Actions > Run workflow) OU création d'un tag vX.Y.Z
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # nécessaire pour publier une Release

jobs:
  # ---------------------------------------------------------------
  # Windows -> SPAM.exe
  # ---------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Construire l'exécutable
        run: >
          pyinstaller --noconfirm --clean
          --name SPAM --windowed --onefile
          --icon app/resources/icon.ico
          --add-data "app/resources;app/resources"
          main.py

      - name: Publier l'artefact (téléchargeable dans l'onglet Actions)
        uses: actions/upload-artifact@v4
        with:
          name: SPAM-Windows
          path: dist/SPAM.exe

      - name: Attacher à la Release (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SPAM.exe

  # ---------------------------------------------------------------
  # macOS -> SPAM.dmg
  # ---------------------------------------------------------------
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Construire l'application
        run: >
          pyinstaller --noconfirm --clean
          --name SPAM --windowed --onefile
          --icon app/resources/icon.icns
          --add-data "app/resources:app/resources"
          main.py

      - name: Emballer en .dmg (fichier unique)
        run: |
          hdiutil create -volname "SPAM" -srcfolder "dist/SPAM.app" -ov -format UDZO "SPAM.dmg"

      - name: Publier l'artefact (téléchargeable dans l'onglet Actions)
        uses: actions/upload-artifact@v4
        with:
          name: SPAM-macOS
          path: SPAM.dmg

      - name: Attacher à la Release (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SPAM.dmg
